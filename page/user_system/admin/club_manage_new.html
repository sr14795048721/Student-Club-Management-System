<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社团管理 - 社团管理系统</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #f0f2f5; }
    .header { background: white; padding: 1rem 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 1.5rem; color: #1e1e2f; display: flex; align-items: center; gap: 10px; }
    .back-btn { padding: 10px 20px; background: #f4f4f9; color: #1e1e2f; border: none; border-radius: 20px; cursor: pointer; transition: 0.2s; }
    .back-btn:hover { background: #e6e9f0; }
    .container { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }
    .card { background: white; border-radius: 24px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.02); }
    .card h2 { font-size: 1.3rem; color: #1e1e2f; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: #5e2a84; color: white; }
    .btn-primary:hover { background: #7b3fa0; }
    .btn-success { background: #48bb78; color: white; }
    .btn-success:hover { background: #38a169; }
    .btn-danger { background: #f56565; color: white; }
    .btn-danger:hover { background: #e53e3e; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
    .club-card { background: #f8f9fa; padding: 1.5rem; border-radius: 12px; border-left: 4px solid #5e2a84; }
    .club-card h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: #2d3748; }
    .club-card p { color: #718096; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; margin-right: 0.5rem; }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-approved { background: #d4edda; color: #155724; }
  </style>
</head>
<body>
  <div class="header">
    <h1><i class="fas fa-sitemap"></i> 社团管理</h1>
    <button class="back-btn" onclick="location.href='admin.html'"><i class="fas fa-arrow-left"></i> 返回</button>
  </div>

  <div class="container">
    <div class="card">
      <h2><i class="fas fa-clock"></i> 待审批申请</h2>
      <div id="applicationsList" class="grid"></div>
    </div>

    <div class="card">
      <h2><i class="fas fa-users"></i> 所有社团</h2>
      <div id="clubsList" class="grid"></div>
    </div>
  </div>

  <script src="/page/auth-check.js"></script>
  <script>
    let currentUser = null;

    async function init() {
      try {
        const token = localStorage.getItem('authToken');
        const res = await fetch('/api/check-session', { headers: { 'Authorization': token } });
        const data = await res.json();
        
        if (!data.success || data.user.role !== 'admin') {
          window.location.href = '/login';
          return;
        }
        
        currentUser = data.user;
        loadApplications();
        loadClubs();
      } catch (err) {
        console.error(err);
        window.location.href = '/login';
      }
    }

    async function loadApplications() {
      const list = document.getElementById('applicationsList');
      try {
        const token = localStorage.getItem('authToken');
        const res = await fetch('/api/clubs/applications', { headers: { 'Authorization': token } });
        const data = await res.json();
        
        const apps = (data.applications || []).filter(a => a.status === 'pending');
        if (apps.length === 0) {
          list.innerHTML = '<div style="text-align:center;padding:2rem;color:#a0aec0;">暂无待审批申请</div>';
          return;
        }
        
        list.innerHTML = apps.map(app => `
          <div class="club-card">
            <h3>${app.name}</h3>
            <p>${app.description}</p>
            <p><i class="fas fa-tag"></i> ${app.type}</p>
            <p><i class="fas fa-user"></i> 申请人ID: ${app.applicant}</p>
            <p style="font-size:0.85rem;color:#999;">申请理由: ${app.reason}</p>
            <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
              <button class="btn btn-success" onclick="approveApplication('${app.id}')"><i class="fas fa-check"></i> 批准</button>
              <button class="btn btn-danger" onclick="rejectApplication('${app.id}')"><i class="fas fa-times"></i> 拒绝</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        list.innerHTML = '<div style="text-align:center;padding:2rem;color:#a0aec0;">加载失败</div>';
      }
    }

    async function loadClubs() {
      const list = document.getElementById('clubsList');
      try {
        const token = localStorage.getItem('authToken');
        const res = await fetch('/api/clubs', { headers: { 'Authorization': token } });
        const data = await res.json();
        
        const clubs = data.clubs || [];
        if (clubs.length === 0) {
          list.innerHTML = '<div style="text-align:center;padding:2rem;color:#a0aec0;">暂无社团</div>';
          return;
        }
        
        list.innerHTML = clubs.map(club => `
          <div class="club-card">
            <h3>${club.name}</h3>
            <p>${club.description || '暂无描述'}</p>
            <p><i class="fas fa-user"></i> 成员: ${club.memberCount || 0}人</p>
            <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
              <button class="btn btn-primary" onclick="managePositions('${club.id}')"><i class="fas fa-user-tag"></i> 设置职位</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        list.innerHTML = '<div style="text-align:center;padding:2rem;color:#a0aec0;">加载失败</div>';
      }
    }

    async function approveApplication(id) {
      if (!confirm('确定批准该申请吗？')) return;
      
      try {
        const token = localStorage.getItem('authToken');
        await fetch(`/api/clubs/applications/${id}/approve`, {
          method: 'POST',
          headers: { 'Authorization': token }
        });
        
        alert('已批准');
        loadApplications();
        loadClubs();
      } catch (err) {
        alert('操作失败: ' + err.message);
      }
    }

    async function rejectApplication(id) {
      if (!confirm('确定拒绝该申请吗？')) return;
      
      try {
        const token = localStorage.getItem('authToken');
        await fetch(`/api/clubs/applications/${id}/reject`, {
          method: 'POST',
          headers: { 'Authorization': token }
        });
        
        alert('已拒绝');
        loadApplications();
      } catch (err) {
        alert('操作失败: ' + err.message);
      }
    }

    function managePositions(clubId) {
      alert('职位管理功能：可设置社长、副社长等职位并任命学生担任');
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
