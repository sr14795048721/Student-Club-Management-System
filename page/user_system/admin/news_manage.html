<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻管理 - 社团管理系统</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #f0f2f5; min-height: 100vh; }
    .header {
      background: white;
      padding: 1rem 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.5rem; color: #1e1e2f; display: flex; align-items: center; gap: 10px; }
    .back-btn {
      padding: 10px 20px;
      background: #f4f4f9;
      color: #1e1e2f;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.2s;
    }
    .back-btn:hover { background: #e6e9f0; }
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
    .toolbar {
      background: white;
      padding: 1.5rem;
      border-radius: 16px;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary { background: #5e2a84; color: white; }
    .btn-primary:hover { background: #7b3fa0; }
    .news-list {
      background: white;
      border-radius: 16px;
      overflow: hidden;
    }
    .news-item {
      padding: 1.5rem;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      gap: 1.5rem;
      align-items: center;
      transition: 0.2s;
    }
    .news-item:hover { background: #f8f9fa; }
    .news-item:last-child { border-bottom: none; }
    .news-cover {
      width: 120px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      background: #e0e0e0;
    }
    .news-info { flex: 1; }
    .news-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; color: #1e1e2f; }
    .news-meta { font-size: 0.85rem; color: #888; display: flex; gap: 1rem; }
    .news-actions {
      display: flex;
      gap: 0.5rem;
    }
    .btn-sm {
      padding: 8px 16px;
      font-size: 0.85rem;
      border-radius: 12px;
    }
    .btn-edit { background: #f4f4f9; color: #1e1e2f; }
    .btn-edit:hover { background: #e6e9f0; }
    .btn-delete { background: #dc3545; color: white; }
    .btn-delete:hover { background: #c82333; }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white;
      border-radius: 24px;
      width: 90%;
      max-width: 900px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .modal-header h2 { font-size: 1.5rem; color: #1e1e2f; }
    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #888;
    }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #333;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      font-size: 0.95rem;
      transition: 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: #5e2a84;
    }
    #editor {
      height: 400px;
      background: white;
    }
    .cover-preview {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 0.5rem;
      display: none;
    }
    .cover-preview.show { display: block; }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 2rem;
    }
    .btn-secondary { background: #f4f4f9; color: #1e1e2f; }
    .btn-secondary:hover { background: #e6e9f0; }
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #888;
    }
    .empty-state i { font-size: 4rem; margin-bottom: 1rem; opacity: 0.3; }
  </style>
</head>
<body>
  <div class="header">
    <h1><i class="fas fa-newspaper"></i> 新闻管理</h1>
    <button class="back-btn" onclick="location.href='admin.html'">
      <i class="fas fa-arrow-left"></i> 返回
    </button>
  </div>

  <div class="container">
    <div class="toolbar">
      <div>
        <span style="color: #888;">共 <strong id="newsCount">0</strong> 篇新闻</span>
      </div>
      <button class="btn btn-primary" onclick="openEditor()">
        <i class="fas fa-plus"></i> 发布新闻
      </button>
    </div>

    <div class="news-list" id="newsList">
      <div class="empty-state">
        <i class="fas fa-newspaper"></i>
        <p>暂无新闻，点击上方按钮发布第一篇新闻</p>
      </div>
    </div>
  </div>

  <div class="modal" id="editorModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">发布新闻</h2>
        <button class="close-btn" onclick="closeEditor()">&times;</button>
      </div>
      
      <form id="newsForm">
        <input type="hidden" id="newsId">
        
        <div class="form-group">
          <label>新闻标题 *</label>
          <input type="text" id="newsTitle" required placeholder="请输入新闻标题">
        </div>

        <div class="form-group">
          <label>封面图片</label>
          <input type="file" id="coverImage" accept="image/*" onchange="previewCover(this)">
          <input type="hidden" id="coverUrl">
          <img id="coverPreview" class="cover-preview">
        </div>

        <div class="form-group">
          <label>发布日期 *</label>
          <input type="date" id="publishDate" required>
        </div>

        <div class="form-group">
          <label>新闻内容 *</label>
          <div id="editor"></div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeEditor()">取消</button>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> 保存
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="/page/auth-check.js"></script>
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <script src="../../api-client.js"></script>
  <script>
    let quill;
    let currentNewsId = null;

    quill = new Quill('#editor', {
      theme: 'snow',
      modules: {
        toolbar: [
          [{ 'header': [1, 2, 3, false] }],
          ['bold', 'italic', 'underline'],
          [{ 'list': 'ordered'}, { 'list': 'bullet' }],
          [{ 'align': [] }],
          ['link', 'image'],
          ['clean']
        ]
      }
    });

    async function loadNews() {
      try {
        const res = await fetch('/api/news');
        const data = await res.json();
        
        if (data.success) {
          const list = document.getElementById('newsList');
          document.getElementById('newsCount').textContent = data.news.length;
          
          if (data.news.length === 0) {
            list.innerHTML = `
              <div class="empty-state">
                <i class="fas fa-newspaper"></i>
                <p>暂无新闻，点击上方按钮发布第一篇新闻</p>
              </div>`;
          } else {
            list.innerHTML = data.news.map(n => `
              <div class="news-item">
                <img src="${n.cover_image || 'https://via.placeholder.com/120x80/8B1A1A/ffffff?text=封面'}" 
                     class="news-cover" onerror="this.src='https://via.placeholder.com/120x80/8B1A1A/ffffff?text=封面'">
                <div class="news-info">
                  <div class="news-title">${n.title}</div>
                  <div class="news-meta">
                    <span><i class="fas fa-calendar"></i> ${n.publish_date}</span>
                    <span><i class="fas fa-user"></i> ${n.author_name}</span>
                    <span><i class="fas fa-eye"></i> ${n.views} 次浏览</span>
                  </div>
                </div>
                <div class="news-actions">
                  <button class="btn btn-sm btn-edit" onclick="editNews(${n.id})">
                    <i class="fas fa-edit"></i> 编辑
                  </button>
                  <button class="btn btn-sm btn-delete" onclick="deleteNews(${n.id})">
                    <i class="fas fa-trash"></i> 删除
                  </button>
                </div>
              </div>
            `).join('');
          }
        }
      } catch (err) {
        console.error('加载新闻失败:', err);
      }
    }

    function openEditor(newsId = null) {
      currentNewsId = newsId;
      document.getElementById('modalTitle').textContent = newsId ? '编辑新闻' : '发布新闻';
      document.getElementById('editorModal').classList.add('active');
      
      if (!newsId) {
        document.getElementById('newsForm').reset();
        document.getElementById('publishDate').valueAsDate = new Date();
        document.getElementById('coverPreview').classList.remove('show');
        if (quill) quill.setContents([]);
      }
    }

    function closeEditor() {
      document.getElementById('editorModal').classList.remove('active');
      currentNewsId = null;
    }

    async function editNews(id) {
      try {
        const res = await fetch(`/api/news/${id}`);
        const data = await res.json();
        
        if (data.success) {
          const n = data.news;
          document.getElementById('newsId').value = n.id;
          document.getElementById('newsTitle').value = n.title;
          document.getElementById('publishDate').value = n.publish_date;
          document.getElementById('coverUrl').value = n.cover_image || '';
          
          if (n.cover_image) {
            document.getElementById('coverPreview').src = n.cover_image;
            document.getElementById('coverPreview').classList.add('show');
          }
          
          if (quill) quill.root.innerHTML = n.content;
          openEditor(id);
        }
      } catch (err) {
        console.error('加载新闻详情失败:', err);
      }
    }

    async function deleteNews(id) {
      if (!confirm('确定要删除这篇新闻吗？')) return;
      
      try {
        const res = await apiClient.delete(`/api/news/${id}`);
        const data = await res.json();
        
        if (data.success) {
          alert('删除成功');
          loadNews();
        }
      } catch (err) {
        alert('删除失败: ' + err.message);
      }
    }

    async function previewCover(input) {
      if (input.files && input.files[0]) {
        const formData = new FormData();
        formData.append('file', input.files[0]);
        
        try {
          const res = await apiClient.post('/api/upload', formData, false);
          const data = await res.json();
          
          if (data.success) {
            document.getElementById('coverUrl').value = data.url;
            document.getElementById('coverPreview').src = data.url;
            document.getElementById('coverPreview').classList.add('show');
          }
        } catch (err) {
          alert('上传失败: ' + err.message);
        }
      }
    }

    document.getElementById('newsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const newsData = {
        title: document.getElementById('newsTitle').value,
        content: quill.root.innerHTML,
        cover_image: document.getElementById('coverUrl').value,
        publish_date: document.getElementById('publishDate').value,
        status: 'published'
      };
      
      try {
        let res;
        if (currentNewsId) {
          res = await apiClient.put(`/api/news/${currentNewsId}`, newsData);
        } else {
          res = await apiClient.post('/api/news', newsData);
        }
        
        const data = await res.json();
        
        if (data.success) {
          alert(currentNewsId ? '更新成功' : '发布成功');
          closeEditor();
          loadNews();
        }
      } catch (err) {
        alert('保存失败: ' + err.message);
      }
    });

    window.addEventListener('load', loadNews);
  </script>
</body>
</html>
