<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活动管理 - 社团管理系统</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #f0f2f5; }
    .header { background: white; padding: 1rem 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 1.5rem; color: #1e1e2f; display: flex; align-items: center; gap: 10px; }
    .back-btn { padding: 10px 20px; background: #f4f4f9; color: #1e1e2f; border: none; border-radius: 20px; cursor: pointer; transition: 0.2s; }
    .back-btn:hover { background: #e6e9f0; }
    .container { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }
    .card { background: white; border-radius: 24px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.02); }
    .card h2 { font-size: 1.3rem; color: #1e1e2f; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; justify-content: space-between; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: #5e2a84; color: white; }
    .btn-primary:hover { background: #7b3fa0; }
    .btn-success { background: #48bb78; color: white; }
    .btn-success:hover { background: #38a169; }
    .btn-secondary { background: #e2e8f0; color: #4a5568; }
    .btn-secondary:hover { background: #cbd5e0; }
    .btn-danger { background: #f56565; color: white; }
    .btn-danger:hover { background: #e53e3e; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
    .activity-card { background: #f8f9fa; padding: 1.5rem; border-radius: 12px; border-left: 4px solid #5e2a84; }
    .activity-card h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: #2d3748; }
    .activity-card p { color: #718096; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; margin-right: 0.5rem; }
    .badge-global { background: #e6f2ff; color: #0066cc; }
    .badge-club { background: #fff3cd; color: #856404; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; border-radius: 16px; padding: 2rem; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #2d3748; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 1rem; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #5e2a84; }
  </style>
</head>
<body>
  <div class="header">
    <h1><i class="fas fa-calendar-alt"></i> 活动管理</h1>
    <button class="back-btn" onclick="location.href='admin.html'"><i class="fas fa-arrow-left"></i> 返回</button>
  </div>

  <div class="container">
    <div class="card">
      <h2>
        <span><i class="fas fa-calendar"></i> 所有活动</span>
        <div>
          <button class="btn btn-success" onclick="openCreateModal('global')"><i class="fas fa-plus"></i> 创建全局活动</button>
          <button class="btn btn-primary" onclick="openCreateModal('club')"><i class="fas fa-plus"></i> 创建社团活动</button>
        </div>
      </h2>
      <div id="activitiesList" class="grid"></div>
    </div>
  </div>

  <div id="activityModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle">创建活动</h2>
      <form onsubmit="submitActivity(event)">
        <input type="hidden" id="activityType">
        <div class="form-group" id="clubSelectGroup" style="display:none;">
          <label>所属社团</label>
          <select id="activityClub"></select>
        </div>
        <div class="form-group">
          <label>活动名称</label>
          <input type="text" id="activityName" required>
        </div>
        <div class="form-group">
          <label>活动时间</label>
          <input type="datetime-local" id="activityDate" required>
        </div>
        <div class="form-group">
          <label>活动地点</label>
          <input type="text" id="activityLocation" required>
        </div>
        <div class="form-group">
          <label>活动描述</label>
          <textarea id="activityDesc" rows="4" required></textarea>
        </div>
        <div class="form-group">
          <label>报名人数限制</label>
          <input type="number" id="activityLimit" min="0" placeholder="0表示不限制">
        </div>
        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary">创建</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/page/auth-check.js"></script>
  <script>
    let currentUser = null;
    let allClubs = [];

    async function init() {
      try {
        const token = localStorage.getItem('authToken');
        const res = await fetch('/api/check-session', { headers: { 'Authorization': token } });
        const data = await res.json();
        
        if (!data.success || data.user.role !== 'admin') {
          window.location.href = '/login';
          return;
        }
        
        currentUser = data.user;
        await loadClubs();
        loadActivities();
      } catch (err) {
        console.error(err);
        window.location.href = '/login';
      }
    }

    async function loadClubs() {
      try {
        const token = localStorage.getItem('authToken');
        const res = await fetch('/api/clubs', { headers: { 'Authorization': token } });
        const data = await res.json();
        allClubs = data.clubs || [];
        
        const select = document.getElementById('activityClub');
        select.innerHTML = allClubs.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      } catch (err) {
        console.error('加载社团失败:', err);
      }
    }

    async function loadActivities() {
      const list = document.getElementById('activitiesList');
      try {
        const token = localStorage.getItem('authToken');
        const res = await fetch(`/api/user/${currentUser.id}/activities`, { headers: { 'Authorization': token } });
        const data = await res.json();
        
        const activities = data.activities || [];
        if (activities.length === 0) {
          list.innerHTML = '<div style="text-align:center;padding:3rem;color:#a0aec0;"><i class="fas fa-calendar" style="font-size:4rem;opacity:0.3;margin-bottom:1rem;"></i><p>暂无活动</p></div>';
          return;
        }
        
        list.innerHTML = activities.map(act => `
          <div class="activity-card">
            <h3>${act.name}</h3>
            <p><i class="fas fa-clock"></i> ${act.date || '待定'}</p>
            <p><i class="fas fa-map-marker-alt"></i> ${act.location || '待定'}</p>
            <p>${act.description || ''}</p>
            <div style="margin-top: 1rem;">
              <span class="badge ${act.type === 'global' ? 'badge-global' : 'badge-club'}">${act.type === 'global' ? '全局活动' : '社团活动'}</span>
              ${act.clubName ? `<span class="badge badge-club">${act.clubName}</span>` : ''}
              <span class="badge" style="background:#e8f5e9;color:#388e3c;">报名: ${act.participants || 0}人</span>
            </div>
            <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
              <button class="btn btn-secondary" onclick="editActivity('${act.id}')"><i class="fas fa-edit"></i> 编辑</button>
              <button class="btn btn-danger" onclick="deleteActivity('${act.id}')"><i class="fas fa-trash"></i> 删除</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        list.innerHTML = '<div style="text-align:center;padding:3rem;color:#a0aec0;"><p>加载失败</p></div>';
      }
    }

    function openCreateModal(type) {
      document.getElementById('activityType').value = type;
      document.getElementById('modalTitle').textContent = type === 'global' ? '创建全局活动' : '创建社团活动';
      document.getElementById('clubSelectGroup').style.display = type === 'club' ? 'block' : 'none';
      document.getElementById('activityModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('activityModal').classList.remove('active');
      document.querySelector('form').reset();
    }

    async function submitActivity(e) {
      e.preventDefault();
      const type = document.getElementById('activityType').value;
      const data = {
        type,
        name: document.getElementById('activityName').value,
        date: document.getElementById('activityDate').value,
        location: document.getElementById('activityLocation').value,
        description: document.getElementById('activityDesc').value,
        limit: document.getElementById('activityLimit').value || 0,
        creator: currentUser.id
      };
      
      if (type === 'club') {
        data.clubId = document.getElementById('activityClub').value;
        const club = allClubs.find(c => c.id === data.clubId);
        data.clubName = club ? club.name : '';
      }
      
      try {
        const token = localStorage.getItem('authToken');
        await fetch(`/api/user/${currentUser.id}/activities`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': token },
          body: JSON.stringify(data)
        });
        
        alert('活动创建成功');
        closeModal();
        loadActivities();
      } catch (err) {
        alert('创建失败: ' + err.message);
      }
    }

    async function deleteActivity(id) {
      if (!confirm('确定要删除这个活动吗？')) return;
      
      try {
        const token = localStorage.getItem('authToken');
        await fetch(`/api/user/${currentUser.id}/activities?id=${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': token }
        });
        
        alert('删除成功');
        loadActivities();
      } catch (err) {
        alert('删除失败: ' + err.message);
      }
    }

    function editActivity(id) {
      alert('编辑功能开发中');
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
