<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社团推荐配置 - 社团管理系统</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #f0f2f5; }
    .header { background: white; padding: 1rem 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 1.5rem; color: #1e1e2f; display: flex; align-items: center; gap: 10px; }
    .back-btn { padding: 10px 20px; background: #f4f4f9; color: #1e1e2f; border: none; border-radius: 20px; cursor: pointer; transition: 0.2s; }
    .back-btn:hover { background: #e6e9f0; }
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
    .card { background: white; border-radius: 24px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.02); }
    .card h2 { font-size: 1.3rem; color: #1e1e2f; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .club-card { background: #f8f9fa; padding: 1.5rem; border-radius: 12px; border: 2px solid transparent; transition: 0.2s; cursor: pointer; }
    .club-card:hover { border-color: #5e2a84; }
    .club-card.selected { border-color: #5e2a84; background: #f3e5f5; }
    .club-card h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: #2d3748; }
    .club-card p { color: #718096; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: #5e2a84; color: white; }
    .btn-primary:hover { background: #7b3fa0; }
    .btn-success { background: #48bb78; color: white; }
    .btn-success:hover { background: #38a169; }
    .action-bar { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="header">
    <h1><i class="fas fa-star"></i> 社团推荐配置</h1>
    <button class="back-btn" onclick="location.href='admin.html'"><i class="fas fa-arrow-left"></i> 返回</button>
  </div>

  <div class="container">
    <div class="card">
      <h2><i class="fas fa-info-circle"></i> 配置说明</h2>
      <p>选择最多4个社团在主页展示推荐。点击社团卡片进行选择/取消选择。</p>
    </div>

    <div class="card">
      <h2><i class="fas fa-users"></i> 所有社团 <span style="font-size:0.9rem;color:#999;margin-left:1rem;">已选择: <span id="selectedCount">0</span>/4</span></h2>
      <div id="clubsList" class="grid"></div>
      <div class="action-bar">
        <button class="btn btn-success" onclick="saveRecommendations()"><i class="fas fa-save"></i> 保存推荐</button>
      </div>
    </div>
  </div>

  <script src="/page/auth-check.js"></script>
  <script>
    let allClubs = [];
    let selectedClubs = [];

    async function init() {
      try {
        const token = localStorage.getItem('authToken');
        const res = await fetch('/api/check-session', { headers: { 'Authorization': token } });
        const data = await res.json();
        
        if (!data.success || data.user.role !== 'admin') {
          window.location.href = '/login';
          return;
        }
        
        await loadClubs();
        loadRecommendations();
      } catch (err) {
        console.error(err);
        window.location.href = '/login';
      }
    }

    async function loadClubs() {
      try {
        const token = localStorage.getItem('authToken');
        const res = await fetch('/api/clubs', { headers: { 'Authorization': token } });
        const data = await res.json();
        
        if (data.success) {
          allClubs = data.clubs || [];
          renderClubs();
        }
      } catch (err) {
        console.error('加载社团失败:', err);
      }
    }

    function loadRecommendations() {
      const saved = localStorage.getItem('recommendedClubs');
      if (saved) {
        selectedClubs = JSON.parse(saved);
        updateSelection();
      }
    }

    function renderClubs() {
      const list = document.getElementById('clubsList');
      if (allClubs.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:3rem;color:#a0aec0;grid-column:1/-1;">暂无社团</div>';
        return;
      }
      
      list.innerHTML = allClubs.map(club => `
        <div class="club-card" data-id="${club.id}" onclick="toggleClub('${club.id}')">
          <h3>${club.name}</h3>
          <p>${club.description || '暂无描述'}</p>
          <p><i class="fas fa-user"></i> 成员: ${club.memberCount || 0}人</p>
        </div>
      `).join('');
      
      updateSelection();
    }

    function toggleClub(clubId) {
      const index = selectedClubs.indexOf(clubId);
      if (index > -1) {
        selectedClubs.splice(index, 1);
      } else {
        if (selectedClubs.length >= 4) {
          alert('最多只能选择4个社团');
          return;
        }
        selectedClubs.push(clubId);
      }
      updateSelection();
    }

    function updateSelection() {
      document.querySelectorAll('.club-card').forEach(card => {
        const id = card.dataset.id;
        if (selectedClubs.includes(id)) {
          card.classList.add('selected');
        } else {
          card.classList.remove('selected');
        }
      });
      document.getElementById('selectedCount').textContent = selectedClubs.length;
    }

    function saveRecommendations() {
      localStorage.setItem('recommendedClubs', JSON.stringify(selectedClubs));
      alert('推荐配置已保存');
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
